name: ai_life_navigator
description: Life Coach - AI Goal Planner. A polished Flutter app that helps users set goals, build habits, and make smarter decisions with AI-powered planning.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # UI / icons
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  http: ^1.6.0

  # Charts (used for sparkline cards on home, risk bars, etc.)
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0
  path_provider: ^2.1.3
  flutter_dotenv: ^5.2.1
  google_generative_ai: ^0.4.6
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  google_sign_in: ^7.2.0
  image_picker: ^1.2.2
  permission_handler: ^12.0.3
  speech_to_text: any
  firebase_analytics: any
  firebase_crashlytics: any
  firebase_remote_config: any
  share_plus: any
  in_app_review: any
  package_info_plus: any
  url_launcher: any




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/icons/


  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
