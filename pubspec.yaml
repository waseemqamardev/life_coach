name: ai_life_navigator
description: Life Coach - AI Goal Planner. A polished Flutter app that helps users set goals, build habits, and make smarter decisions with AI-powered planning.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^17.3.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # UI / icons
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  http: ^1.6.0

  # Charts (used for sparkline cards on home, risk bars, etc.)
  fl_chart: ^1.2.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0
  path_provider: ^2.1.3
  flutter_dotenv: ^6.0.1
  google_generative_ai: ^0.4.6
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  google_sign_in: ^7.2.0
  image_picker: ^1.2.2
  permission_handler: ^12.0.3
  speech_to_text: ^7.4.0  # Specify version instead of 'any'
  firebase_analytics: ^12.4.3  # Specify version
  firebase_crashlytics: ^5.2.4  # Specify version
  firebase_remote_config: ^6.5.3  # Specify version
  share_plus: ^13.1.0  # Specify version
  in_app_review: ^2.0.10  # Specify version
  package_info_plus: ^10.1.0  # Specify version
  url_launcher: ^6.3.0  # Specify version

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.0  # Add version

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

# Launcher Icons Configuration - MUST be at root level
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/home_screen_logo.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/home_screen_logo.png"
  min_sdk_android: 21
